<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Library</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>My Library</h1>
    <button id="open-dialog-btn">Insert Book</button>
  </header>

  <main id="library-container"></main>

  <dialog id="book-dialog">
    <h2>Insert Book</h2>
    <form id="book-form">
      <div class="form-group">
        <label for="title">Title:</label>
        <input type="text" id="title" required>
      </div>

      <div class="form-group">
        <label for="author">Author:</label>
        <input type="text" id="author" required>
      </div>

      <div class="form-group">
        <label for="pages">Pages:</label>
        <input type="number" id="pages" min="1" required>
      </div>

      <div class="form-group checkbox">
        <label for="is-read">Read?</label>
        <input type="checkbox" id="is-read">
      </div>

      <div class="form-actions">
        <button type="button" id="close-dialog-btn">Cancel</button>
        <button type="submit">Save</button>
      </div>
    </form>
  </dialog>

  <script src="script.js"></script>
  <script>
    const dialog = document.getElementById('book-dialog');
    document.getElementById('open-dialog-btn').addEventListener('click', () => dialog.showModal());
    document.getElementById('close-dialog-btn').addEventListener('click', () => dialog.close());
  </script>
</body>
</html>
